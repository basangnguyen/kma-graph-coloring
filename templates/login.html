<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMA - Đăng nhập</title>
    <!-- Import Font Inter từ Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0054a5; /* Xanh KMA chủ đạo cho Đăng nhập */
            --primary-hover: #004385;
            --bg-color: #f3f4f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #d1d5db;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .login-container {
            background: var(--white);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08), 0 0 10px rgba(0,0,0,0.03);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            border-top: 5px solid var(--primary-color); /* Viền trên màu xanh dương */
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            color: var(--primary-color);
            margin: 0 0 8px 0;
            font-weight: 700;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Xử lý màu sắc thông báo động từ Flask */
        .alert {
            padding: 12px 16px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
            animation: slideDown 0.4s ease-out;
        }

        .alert.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert.danger, .alert.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .alert.warning { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: #f9fafb;
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(0, 84, 165, 0.15); /* Glow màu xanh dương */
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 84, 165, 0.25);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .divider {
            height: 1px;
            background: var(--border-color);
            margin: 25px 0;
            position: relative;
        }

        .footer-text {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 0;
        }

        .footer-text a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer-text a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header">
            <h2>Đăng nhập KMA</h2>
            <p>Chào mừng bạn quay trở lại hệ thống</p>
        </div>

        <!-- Hiển thị thông báo động từ Flask (Thành công, Lỗi, Cảnh báo) -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert {{ category if category != 'message' else 'warning' }}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" placeholder="Nhập tên tài khoản của bạn" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-submit">Đăng nhập ngay</button>
        </form>

        <div class="divider"></div>

        <p class="footer-text">
            Chưa có tài khoản? <a href="/register">Tạo tài khoản mới</a>
        </p>
    </div>

</body>
</html>
