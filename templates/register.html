<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMA - Đăng ký tài khoản</title>
    <style>
        :root {
            --primary-color: #0054a5; /* Xanh KMA */
            --success-color: #28a745; /* Xanh lá đăng ký */
            --success-hover: #218838;
            --bg-gradient: linear-gradient(135deg, #eceff1 0%, #cfd8dc 100%);
            --white: #ffffff;
            --error-bg: #f8d7da;
            --error-text: #721c24;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .register-box {
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 360px;
            text-align: center;
            border-top: 6px solid var(--success-color); /* Điểm nhấn viền trên màu xanh lá */
            transition: transform 0.3s ease;
        }

        .register-box:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        /* Flash Messages */
        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 0.85em;
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid #f5c6cb;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        input:focus {
            border-color: var(--success-color);
            box-shadow: 0 0 8px rgba(40, 167, 69, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--success-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        button:hover {
            background: var(--success-hover);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
        }

        button:active {
            transform: scale(0.97);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 0.9em;
            color: #666;
        }

        .footer-text a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer-text a:hover {
            color: var(--success-color);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-box">
        <h2>TẠO TÀI KHOẢN</h2>
        
        <!-- Hiển thị thông báo lỗi từ Flask -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="Tên đăng nhập mới" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Mật khẩu" required>
            </div>
            <button type="submit">ĐĂNG KÝ NGAY</button>
        </form>

        <p class="footer-text">
            Đã có tài khoản? <a href="/login">Đăng nhập tại đây</a>
        </p>
    </div>

</body>
</html>
